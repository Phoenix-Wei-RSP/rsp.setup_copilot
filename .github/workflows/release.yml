name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build all
        run: pnpm run build

      - name: Create Zip Package
        run: zip -r rsp-dist.zip dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-package
          path: rsp-dist.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-package
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: rsp-dist.zip
          draft: true
          body: |
            ## RSP Setup Copilot Bundle
            
            This release contains the full `dist` bundle including the CLI and all generated resources (skills, hooks, MCPs).
            
            ### How to use
            1. Download `rsp-dist.zip`
            2. Extract it
            3. Run `node dist/cli.js init`
            
            Alternatively, use npm:
            ```bash
            npx @rsp/cli init
            ```
