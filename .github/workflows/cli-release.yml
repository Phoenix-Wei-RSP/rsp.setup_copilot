name: Build and Release CLI Binaries

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            name: rsp-macos-arm64
          - os: macos-latest
            target: darwin-x64
            name: rsp-macos-x64
          - os: ubuntu-latest
            target: linux-x64
            name: rsp-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            name: rsp-linux-arm64
          - os: windows-latest
            target: windows-x64
            name: rsp-windows-x64.exe

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build binary
        working-directory: packages/cli
        run: bun build src/index.ts --compile --target=bun-${{ matrix.target }} --outfile dist/${{ matrix.name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: packages/cli/dist/${{ matrix.name }}
          retention-days: 1

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: List downloaded files
        run: ls -R binaries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CLI Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            binaries/rsp-macos-arm64/rsp-macos-arm64
            binaries/rsp-macos-x64/rsp-macos-x64
            binaries/rsp-linux-x64/rsp-linux-x64
            binaries/rsp-linux-arm64/rsp-linux-arm64
            binaries/rsp-windows-x64.exe/rsp-windows-x64.exe
          body: |
            ## RSP CLI Binaries
            
            Standalone executables for all platforms. No Node.js required!
            
            ### Installation
            
            **macOS (Apple Silicon):**
            ```bash
            curl -L -o rsp https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rsp-macos-arm64
            chmod +x rsp
            sudo mv rsp /usr/local/bin/
            ```
            
            **macOS (Intel):**
            ```bash
            curl -L -o rsp https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rsp-macos-x64
            chmod +x rsp
            sudo mv rsp /usr/local/bin/
            ```
            
            **Linux (x64):**
            ```bash
            curl -L -o rsp https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/rsp-linux-x64
            chmod +x rsp
            sudo mv rsp /usr/local/bin/
            ```
            
            **Windows (x64):**
            Download `rsp-windows-x64.exe` and add to your PATH.
            
            ### Usage
            
            ```bash
            rsp init
            ```
            
            See [CLI README](https://github.com/${{ github.repository }}/blob/master/packages/cli/README.md) for full documentation.
