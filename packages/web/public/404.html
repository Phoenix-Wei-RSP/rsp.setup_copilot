<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RSP Setup Copilot</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirects all 404s back to index.html preserving the path
      // See: https://github.com/rafgraph/spa-github-pages
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
        '/?/' + l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
